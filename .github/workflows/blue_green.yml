name: Blue-Green Pipeline

on:
  push:
    branches:
      - master

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fast-api-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: fast-api-dev/package-lock.json

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Ejecutar Prettier
        run: npm run format

  deploy:
    name: Deploy Blue-Green
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH con bastion
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.BASTION_IP }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host bastion
            HostName ${{ secrets.BASTION_IP }}
            User ${{ secrets.GCP_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no

          Host 10.0.*.*
            User ${{ secrets.GCP_USER }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      - name: Leer estado actual
        id: state
        run: |
          ACTIVE=$(ssh ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "cat ~/current_deploy.env 2>/dev/null | grep ACTIVE | cut -d'=' -f2 || echo 'blue'")
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          if [ "$ACTIVE" = "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "target_port=3001" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "target_port=3000" >> $GITHUB_OUTPUT
          fi

      - name: Info del deploy
        run: |
          echo "Ambiente activo: ${{ steps.state.outputs.active }}"
          echo "Desplegando en: ${{ steps.state.outputs.target }}"

      - name: Copiar código a docker-bryan
        run: |
          ssh ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "mkdir -p ~/app-${{ steps.state.outputs.target }}"
          rsync -av --exclude='node_modules' --exclude='.git' \
            -e "ssh -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
                -o StrictHostKeyChecking=no \
                -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }}:~/app-${{ steps.state.outputs.target }}/

      - name: Desplegar contenedor Docker
        run: |
          ssh ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} << ENDSSH
            set -e
            TARGET=${{ steps.state.outputs.target }}
            PORT=${{ steps.state.outputs.target_port }}
            cd ~/app-\$TARGET
            npm install --legacy-peer-deps --production
            docker stop app-\$TARGET 2>/dev/null || true
            docker rm app-\$TARGET 2>/dev/null || true
            docker run -d \
              --name app-\$TARGET \
              --restart unless-stopped \
              -p \$PORT:3000 \
              -e NODE_ENV=production \
              -e APP_ENV=\$TARGET \
              -v ~/app-\$TARGET:/usr/src/app \
              -w /usr/src/app \
              node:18-alpine \
              node ./bin/www
            echo "Contenedor app-\$TARGET corriendo en puerto \$PORT"
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          ssh ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "curl -f http://localhost:${{ steps.state.outputs.target_port }}/health"

      - name: Cambiar tráfico en Nginx
        run: |
          ssh ${{ secrets.GCP_USER }}@${{ secrets.NGINX_VM_IP }} \
            "sudo tee /etc/nginx/sites-available/app.conf << 'EOF'
          upstream app_backend {
              server ${{ secrets.DOCKER_VM_IP }}:${{ steps.state.outputs.target_port }};
          }
          server {
              listen 80;
              location / {
                  proxy_pass http://app_backend;
                  proxy_set_header Host \$host;
                  add_header X-Deploy-Color ${{ steps.state.outputs.target }};
              }
          }
          EOF
          sudo ln -sf /etc/nginx/sites-available/app.conf /etc/nginx/sites-enabled/app.conf
          sudo nginx -t && sudo systemctl reload nginx"

      - name: Actualizar current_deploy.env
        run: |
          ssh ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "echo 'ACTIVE=${{ steps.state.outputs.target }}' > ~/current_deploy.env"

      - name: Resumen
        run: |
          echo "================================"
          echo "DEPLOY COMPLETADO"
          echo "Anterior: ${{ steps.state.outputs.active }}"
          echo "Activo:   ${{ steps.state.outputs.target }}"
          echo "================================"