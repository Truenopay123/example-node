name: Blue-Green Pipeline

on:
  push:
    branches:
      - master

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fast-api-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: fast-api-dev/package-lock.json

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Fix permisos de binarios
        run: chmod +x node_modules/.bin/* || true

      - name: Ejecutar ESLint
        run: npx eslint .

      - name: Ejecutar Prettier
        run: npx prettier --write .

  deploy:
    name: Deploy Blue-Green
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH con bastion
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keyscan -T 10 -H "${{ secrets.BASTION_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host bastion\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n\nHost 10.0.*.*\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  ProxyJump bastion\n  StrictHostKeyChecking no\n' \
            "${{ secrets.BASTION_IP }}" \
            "${{ secrets.GCP_USER }}" \
            "${{ secrets.GCP_USER }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test conexión bastion
        run: |
          ssh -vvv \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            ${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            "echo bastion-ok"

      - name: Leer estado actual
        id: state
        run: |
          ACTIVE=$(ssh \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "cat ~/current_deploy.env 2>/dev/null | grep ACTIVE | cut -d'=' -f2 || echo 'blue'")
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          if [ "$ACTIVE" = "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "target_port=3001" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "target_port=3000" >> $GITHUB_OUTPUT
          fi

      - name: Info del deploy
        run: |
          echo "Ambiente activo: ${{ steps.state.outputs.active }}"
          echo "Desplegando en: ${{ steps.state.outputs.target }}"

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Copiar código a docker-bryan
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "mkdir -p ~/app-${{ steps.state.outputs.target }}"
          rsync -av --exclude='node_modules' --exclude='.git' \
            -e "ssh -o StrictHostKeyChecking=no -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} -i ~/.ssh/id_ed25519" \
            ./fast-api-dev/ ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }}:~/app-${{ steps.state.outputs.target }}/

      - name: Desplegar contenedor Docker
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} << 'ENDSSH'
            set -e
            TARGET=${{ steps.state.outputs.target }}
            PORT=${{ steps.state.outputs.target_port }}
            cd ~/app-$TARGET
            docker stop app-$TARGET 2>/dev/null || true
            docker rm app-$TARGET 2>/dev/null || true
            docker run -d \
              --name app-$TARGET \
              --restart unless-stopped \
              -p $PORT:3000 \
              -e NODE_ENV=production \
              -e APP_ENV=$TARGET \
              -v ~/app-$TARGET:/usr/src/app \
              -w /usr/src/app \
              node:18-alpine \
              sh -c "npm install --legacy-peer-deps && node ./bin/www"
            echo "Contenedor app-$TARGET corriendo en puerto $PORT"
          ENDSSH

      - name: Health check
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "for i in \$(seq 1 20); do curl -fsS http://localhost:${{ steps.state.outputs.target_port }}/health && exit 0; echo 'Intento '\$i' fallido, esperando...'; sleep 5; done; exit 1"

      - name: Cambiar tráfico en Nginx
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.NGINX_VM_IP }} \
            "sudo tee /etc/nginx/sites-available/app.conf > /dev/null << 'NGINX'
          upstream app_backend {
              server ${{ secrets.DOCKER_VM_IP }}:${{ steps.state.outputs.target_port }};
          }
          server {
              listen 80;
              location / {
                  proxy_pass http://app_backend;
                  proxy_set_header Host \$host;
                  add_header X-Deploy-Color ${{ steps.state.outputs.target }};
              }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/app.conf /etc/nginx/sites-enabled/app.conf
          sudo nginx -t && sudo systemctl reload nginx"

      - name: Actualizar current_deploy.env
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "echo 'ACTIVE=${{ steps.state.outputs.target }}' > ~/current_deploy.env"

      - name: Resumen
        run: |
          echo "================================"
          echo "DEPLOY COMPLETADO"
          echo "Anterior: ${{ steps.state.outputs.active }}"
          echo "Activo:   ${{ steps.state.outputs.target }}"
          echo "================================"